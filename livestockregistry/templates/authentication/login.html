<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar Sesion al Sistema</title>
    <link rel="stylesheet" href="{% static 'core/main.css' %}">
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <h2 class="text-2xl font-semibold mb-6 text-center">Inisiar Sesion</h2>

    {% if error %}
      <div class="mb-4 text-red-600 bg-red-100 p-3 rounded">
        {{ error }}
      </div>
    {% endif %}

    <form method="POST" action="">
      {% csrf_token %}
      <label class="block mb-2 font-medium text-gray-700" for="username">Ingrese se Usuario </label>
      <input
        type="text"
        name="username"
        id="username"
        required
        class="w-full p-3 mb-4 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="usuario "
      />

      <label class="block mb-2 font-medium text-gray-700" for="password">Ingrese su Contraseña</label>
      <input
        type="password"
        name="password"
        id="password"
        required
        class="w-full p-3 mb-6 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="contraseña"
      />

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 transition-colors"
      >
        Ingresar 
      </button>
    </form>
  </div>

</body>
</html>
