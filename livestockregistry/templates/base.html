<!DOCTYPE html>
{% load static %}
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo</title>
  <!-- Tailwind CDN -->
   <link rel="stylesheet" href="{% static 'core/main.css' %}">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* Custom scrollbar hide */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="flex h-screen bg-gray-100">
  <!-- Sidebar -->
  <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-950 shadow-lg transform -translate-x-full md:translate-x-0 transition-transform duration-300 z-30">
    <div class="p-4 font-bold text-xl text-gray-800">Mi Dashboard</div>
    <nav class="mt-6">
      <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-slate-900 transition-colors"><i class="fas fa-home mr-3"></i>Inicio</a>
      <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-slate-900 transition-colors"><i class="fas fa-chart-bar mr-3"></i>Analytics</a>
      <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-slate-900 transition-colors"><i class="fas fa-users mr-3"></i>Usuarios</a>
      <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-slate-900 transition-colors"><i class="fas fa-shopping-cart mr-3"></i>Ventas</a>
      <a href="#" class="block px-4 py-3 text-gray-700 hover:bg-slate-900 transition-colors"><i class="fas fa-cog mr-3"></i>Configuración</a>
    </nav>
  </aside>
  <!-- Overlay para móvil -->
  <div id="overlay" class="fixed inset-0 bg-slate-900 bg-opacity-50 opacity-0 invisible transition-opacity duration-300 md:hidden"></div>

  <!-- Contenido principal -->
  <div class="flex-1 flex flex-col ml-0 md:ml-64">
    <!-- Navbar -->
    <header class="flex items-center justify-between bg-slate-950 shadow px-4 py-2">
      <button id="btnSidebar" class="text-gray-600 focus:outline-none md:hidden">
        <i class="fas fa-bars fa-lg"></i>
      </button>
      <h1 class="text-xl font-semibold text-gray-800">Panel </h1>
      <div class="flex items-center space-x-4">
        <div class="relative">
          <input type="text" placeholder="Buscar..." class="px-4 py-2 rounded-lg border focus:outline-none focus:ring w-64" />
          <i class="fas fa-search absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
        </div>
        <div class="relative">
          <button id="userMenuBtn" class="flex items-center space-x-2 focus:outline-none">
            <img src="https://i.pravatar.cc/32" alt="User" class="w-8 h-8 rounded-full" />
            <i class="fas fa-chevron-down text-gray-600"></i>
          </button>
          <div id="userMenu" class="absolute right-0 mt-2 w-48 bg-white shadow-lg rounded-md overflow-hidden opacity-0 invisible transform scale-95 transition-all duration-150 origin-top-right">
            <a href="#" class="block px-4 py-2 text-gray-700 hover:bg-gray-100"><i class="fas fa-user mr-2"></i>Perfil</a>
            <a href="{% url 'logout' %}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100"><i class="fas fa-sign-out-alt mr-2"></i>Cerrar sesión</a>
          </div>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="flex-1 overflow-y-auto p-6 scrollbar-hide">
      {% block content %}
      {% endblock %}
    </main>
  </div>

  <!-- JavaScript -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const btnSidebar = document.getElementById('btnSidebar');
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      const userMenuBtn = document.getElementById('userMenuBtn');
      const userMenu = document.getElementById('userMenu');

      // Toggle sidebar mobile
      btnSidebar.addEventListener('click', () => {
        sidebar.classList.toggle('-translate-x-full');
        overlay.classList.toggle('opacity-0');
        overlay.classList.toggle('invisible');
      });

      // Click overlay to close
      overlay.addEventListener('click', () => {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('opacity-0', 'invisible');
      });

      // Toggle user menu
      userMenuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        userMenu.classList.toggle('opacity-0');
        userMenu.classList.toggle('invisible');
        userMenu.classList.toggle('scale-95');
      });

      // Close user menu on outside click
      document.addEventListener('click', (e) => {
        if (!userMenu.contains(e.target) && !userMenuBtn.contains(e.target)) {
          userMenu.classList.add('opacity-0', 'invisible', 'scale-95');
        }
      });
    });
  </script>
</body>
</html>
